name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build (${{ matrix.build_type }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        build_type: [RelWithDebInfo, Benchmark, Sanitizer, Coverage]
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install Clang
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends clang

      # This never restores or stores anything from PR input, and GitHub
      # scopes cache writes to the branch that created them, so a PR from
      # a fork cannot poison the cache that `main` reads from.
      - name: Cache CPM sources
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/CPM
          key: cpm-${{ runner.os }}-${{ hashFiles('cmake/setup_benchmark.cmake', 'cmake/CPM.cmake') }}

      - name: Configure
        run: >
          cmake -B build -S .
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DCMAKE_C_COMPILER=clang
          -DCMAKE_CXX_COMPILER=clang++
          -DENABLE_FUZZING=OFF

      - name: Build
        run: cmake --build build -j "$(nproc)"

      - name: Smoke test
        run: ./build/encoding/test_encoding --benchmark_min_time=0.01s
